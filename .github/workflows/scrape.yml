name: 自动采集
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests beautifulsoup4 lxml
      - run: python scraper.py
      - run: |
          git config user.name scraper-bot
          git config user.email bot@yuecheng.finance
          git add data.json
          git diff --staged --quiet || git commit -m "data: auto $(date +%Y-%m-%d)"
          git push
