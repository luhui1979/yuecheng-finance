name: Auto Scrape

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests beautifulsoup4 lxml --quiet
      - run: python scraper.py || echo "部分源失败"
      - name: 提交
        run: |
          git config user.name "scraper-bot"
          git config user.email "bot@yuecheng.finance"
          git add data.json
          if ! git diff --staged --quiet; then
            git commit -m "data: auto"
            git push
          fi
